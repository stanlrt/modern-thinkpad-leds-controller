name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: ${{ matrix.job_name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_kind: format_lint
            job_name: dotnet format + build (analyzers)
            restore_project: ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          - job_kind: test
            job_name: dotnet test (unit & component)
            restore_project: ModernThinkPadLEDsController.Tests/ModernThinkPadLEDsController.Tests.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.restore_project }}

      - name: Check formatting (dotnet format)
        if: matrix.job_kind == 'format_lint'
        # Fails if any file deviates from .editorconfig rules.
        # Remove --verify-no-changes locally to auto-fix instead.
        run: >
          dotnet format ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --no-restore
          --verify-no-changes
          --verbosity diagnostic

      - name: Lint (build with analyzer warnings as errors)
        if: matrix.job_kind == 'format_lint'
        # Roslyn analyzers run as part of the build; /warnaserror promotes
        # every analyzer warning to an error so the step fails on violations.
        run: >
          dotnet build ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --no-restore
          --configuration Release
          /warnaserror

      - name: Run tests
        if: matrix.job_kind == 'test'
        run: >
          dotnet test ModernThinkPadLEDsController.Tests/ModernThinkPadLEDsController.Tests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always() && matrix.job_kind == 'test'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
