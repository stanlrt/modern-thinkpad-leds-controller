name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prepare:
    name: restore dependencies
    runs-on: windows-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore ModernThinkPadLEDsController.Tests/ModernThinkPadLEDsController.Tests.csproj

      - name: Upload restored state
        uses: actions/upload-artifact@v4
        with:
          name: restored-state
          path: |
            .nuget/packages
            ModernThinkPadLEDsController/obj
            ModernThinkPadLEDsController.Tests/obj
          if-no-files-found: error
          compression-level: 0

  lint:
    name: dotnet format + build (analyzers)
    runs-on: windows-latest
    needs: prepare
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Download restored state
        uses: actions/download-artifact@v4
        with:
          name: restored-state
          path: ${{ github.workspace }}

      - name: Check formatting (dotnet format)
        # Fails if any file deviates from .editorconfig rules.
        # Remove --verify-no-changes locally to auto-fix instead.
        run: >
          dotnet format ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --no-restore
          --verify-no-changes
          --verbosity diagnostic

      - name: Lint (build with analyzer warnings as errors)
        # Roslyn analyzers run as part of the build; /warnaserror promotes
        # every analyzer warning to an error so the step fails on violations.
        run: >
          dotnet build ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --no-restore
          --configuration Release
          /warnaserror

  test:
    name: dotnet test (unit & component)
    runs-on: windows-latest
    needs: prepare
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"

      - name: Download restored state
        uses: actions/download-artifact@v4
        with:
          name: restored-state
          path: ${{ github.workspace }}

      - name: Run tests
        run: >
          dotnet test ModernThinkPadLEDsController.Tests/ModernThinkPadLEDsController.Tests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
