name: Release

on:
  push:
    tags:
      - '*.*.*'  # Triggers on version tags like 1.0.0, 1.2.3, etc.

permissions:
  contents: write  # Required to create releases

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Download PawnIO installer for bundling
        shell: pwsh
        run: |
          $url = "https://github.com/namazso/PawnIO.Setup/releases/latest/download/PawnIO_setup.exe"
          $destinationDirectory = "ModernThinkPadLEDsController/Resources"
          $destinationPath = Join-Path $destinationDirectory "PawnIO-Setup.exe"

          New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $destinationPath

          if (-not (Test-Path $destinationPath)) {
            throw "Failed to download PawnIO installer to $destinationPath"
          }

          Write-Host "PawnIO installer downloaded to $destinationPath"

      - name: Restore dependencies
        run: dotnet restore ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj /p:RuntimeIdentifier=win-x64

      - name: Publish Release Build
        run: >
          dotnet publish ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --configuration Release
          --output ./publish
          --no-restore
          /p:PublishSingleFile=true
          /p:SelfContained=true
          /p:RuntimeIdentifier=win-x64
          /p:PublishReadyToRun=false
          /p:DebugType=None
          /p:DebugSymbols=false

      - name: Cache .NET Tools
        uses: actions/cache@v5
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-wix-6.0.2

      - name: Install WiX Toolset v6
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add -g WixToolset.UI.wixext/6.0.2

      - name: Build MSI Installer
        id: build_msi
        run: |
          $version = "${{ github.ref_name }}"
          $msiName = "ModernThinkPadLEDsController-${{ github.ref_name }}-win-x64.msi"

          # Build the MSI using WiX v6
          wix build -arch x64 `
            -ext WixToolset.UI.wixext `
            -d PublishDir=publish `
            -d ProjectDir=Installer `
            -d Version=$version `
            -out $msiName `
            Installer\Product.wxs

          # Set output for next step
          echo "msi_name=$msiName" >> $env:GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Verify MSI file exists
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "`nListing files in current directory:"
          Get-ChildItem -Filter "*.msi" | Format-Table Name, Length

          $msiFile = "${{ steps.build_msi.outputs.msi_name }}"
          if (-not (Test-Path $msiFile)) {
            Write-Error "MSI file not found at: $msiFile"
            exit 1
          }
          Write-Host "`nMSI file found: $msiFile"
          Write-Host "File size: $((Get-Item $msiFile).Length / 1MB) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_msi.outputs.msi_name }}
          name: ${{ steps.build_msi.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Installation
            1. Download the `.msi` installer below
            2. Run the installer (requires administrator privileges)
            3. Launch "Modern ThinkPad LEDs Controller" from the Start Menu

            ## Requirements
            - Windows 10/11 (x64)
            - Administrator privileges for hardware access

            ## What's Changed

            ### ✨ New Features

            ### 🐛 Bug Fixes

            ### 🏗️ Code Quality & Architecture

            ### 🔧 CI/CD & Testing

            ### 📚 Documentation & Maintenance

            **Full Changelog**: https://github.com/stanlrt/modern-thinkpad-leds-controller/compare/1.x.x...1.x.x
