name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write  # Required to create releases

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.103"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Download PawnIO installer for bundling
        shell: pwsh
        run: |
          $url = "https://github.com/namazso/PawnIO.Setup/releases/latest/download/PawnIO_setup.exe"
          $destinationDirectory = "ModernThinkPadLEDsController/Resources"
          $destinationPath = Join-Path $destinationDirectory "PawnIO-Setup.exe"

          New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $destinationPath

          if (-not (Test-Path $destinationPath)) {
            throw "Failed to download PawnIO installer to $destinationPath"
          }

          Write-Host "PawnIO installer downloaded to $destinationPath"

      - name: Restore dependencies
        run: dotnet restore ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj /p:PublishReadyToRun=true /p:RuntimeIdentifier=win-x64

      - name: Publish Release Build
        run: >
          dotnet publish ModernThinkPadLEDsController/ModernThinkPadLEDsController.csproj
          --configuration Release
          --output ./publish
          --no-restore
          /p:PublishSingleFile=true
          /p:SelfContained=true
          /p:RuntimeIdentifier=win-x64

      - name: Cache .NET Tools
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-wix-6.0.2

      - name: Install WiX Toolset v6
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add -g WixToolset.UI.wixext/6.0.2

      - name: Build MSI Installer
        id: build_msi
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $msiName = "ModernThinkPadLEDsController-${{ github.ref_name }}-win-x64.msi"

          # Build the MSI using WiX v6
          wix build -arch x64 `
            -ext WixToolset.UI.wixext `
            -d PublishDir=publish `
            -d ProjectDir=Installer `
            -d Version=$version `
            -out $msiName `
            Installer\Product.wxs

          # Set output for next step
          echo "msi_name=$msiName" >> $env:GITHUB_OUTPUT
          echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Verify MSI file exists
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "`nListing files in current directory:"
          Get-ChildItem -Filter "*.msi" | Format-Table Name, Length
          
          $msiFile = "${{ steps.build_msi.outputs.msi_name }}"
          if (-not (Test-Path $msiFile)) {
            Write-Error "MSI file not found at: $msiFile"
            exit 1
          }
          Write-Host "`nMSI file found: $msiFile"
          Write-Host "File size: $((Get-Item $msiFile).Length / 1MB) MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_msi.outputs.msi_name }}
          name: Release ${{ steps.build_msi.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Installation
            1. Download the `.msi` installer below
            2. Run the installer (requires administrator privileges)
            3. Launch "Modern ThinkPad LEDs Controller" from the Start Menu

            ## Requirements
            - Windows 10/11 (x64)
            - Administrator privileges for hardware access

            ## Features
            - Self-contained installer (no .NET installation required)
            - Installs to Program Files
            - Creates Start Menu shortcut
            - Clean uninstall via Add/Remove Programs

            ## What's Changed

            ### ✨ New Features
            - **Custom hotkey support** for LED control cycles
            - **Keyboard backlight slider** for fine-grained brightness control
            - **Auto-start on installation** for seamless user experience
            - Enhanced tray icon and application icons (MSI installer and app)

            ### 🐛 Bug Fixes
            - Fixed LED behavior issues:
              - LED modes now correctly override observed mute state
              - All LEDs can now blink (previously restricted)
              - Mute button now properly reverts to default state when pressed
              - LEDs now switch to hotkey cycle state correctly
              - Fixed fullscreen dimming override issues and guard against LEDs absent from partial mappings
            - Fixed hotkey cycles not being persisted across restarts
            - Fixed atomic hardware controls to prevent race conditions
            - Fixed dimming issues and ensured previous hotkey settings aren't lost
            - Fixed runtime side effects during settings loading
            - Resolved WPF .NET compatibility issues
            - Fixed title bar display issue
            - Restored horizontal scroll functionality

            ### 🏗️ Code Quality & Architecture
            - **Adopted colocated test files** with comprehensive unit and component tests
            - Added test infrastructure and seams for better testability
            - **Centralized settings management** with unified defaults, min/max values, and validation
            - Refactored to **domain-driven structure** for improved code organization
            - Broke apart MainViewModel for better separation of concerns
            - Cleaned up MainWindow, App, AppSettings, and LedMode classes
            - Improved installer state machine
            - Removed all compiler warnings and fixed linting issues
            - Fixed bare catch blocks and fragile exception matching patterns

            ### 🔧 CI/CD & Testing
            - Added **GitHub Actions workflows** for automated testing
            - Merged format-lint and test workflows into unified CI pipeline
            - Added component and unit tests with proper test infrastructure
            - Improved test execution with `--no-restore` flag optimizations

            ### 📚 Documentation & Maintenance
            - Updated license information (LICENSE file)
            - Improved documentation and README files
            - Added more detailed logging for debugging
            - Better XML documentation for test constructors

            **Full Changelog**: https://github.com/stanlrt/modern-thinkpad-leds-controller/compare/v1.0.0...v1.1.0
